name: dotnet-ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore QLProtocolLibrary.sln

      - name: Build
        run: dotnet build QLProtocolLibrary.sln -c Release --no-restore

      - name: Run demo
        run: dotnet run --project examples/QLProtocolLibrary.Demo/QLProtocolLibrary.Demo.csproj -c Release --no-build

      - name: Pack
        run: dotnet pack src/QLProtocolLibrary/QLProtocolLibrary.csproj -c Release --no-build -o artifacts/ci-pack

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: qlprotocollibrary-packages
          path: artifacts/ci-pack/*.nupkg
