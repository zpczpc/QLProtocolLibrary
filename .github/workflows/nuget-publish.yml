name: nuget-publish

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore QLProtocolLibrary.sln

      - name: Build
        run: dotnet build QLProtocolLibrary.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/QLProtocolLibrary.Tests/QLProtocolLibrary.Tests.csproj -c Release --no-build

      - name: Pack
        run: dotnet pack src/QLProtocolLibrary/QLProtocolLibrary.csproj -c Release --no-build -o artifacts/release

      - name: Push package to NuGet
        shell: pwsh
        run: |
          $packages = Get-ChildItem artifacts/release/*.nupkg
          foreach ($package in $packages) {
            dotnet nuget push $package.FullName --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          }

      - name: Push symbols to NuGet
        shell: pwsh
        run: |
          $symbols = Get-ChildItem artifacts/release/*.snupkg
          foreach ($symbol in $symbols) {
            dotnet nuget push $symbol.FullName --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          }
